name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets
      - run: cargo test

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y valgrind
      - run: cargo install gungraun-runner --version 0.17.2
      - name: Build benchmarks
        run: cargo bench --no-run
      - name: Debug callgrind on integer_roots
        if: always()
        run: |
          BIN=$(cargo bench --bench integer_roots --no-run 2>&1 | grep -oP 'Executable.*\(\K[^)]+')
          valgrind --tool=callgrind --callgrind-out-file=/dev/null "$BIN" --bench 2>&1 || true
      - run: ulimit -s 65536 && cargo bench
